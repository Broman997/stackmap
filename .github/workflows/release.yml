name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run electron:build
        env:
          ELECTRON_BUILD: true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run electron:build
        env:
          ELECTRON_BUILD: true

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
          body: |
            StackMap desktop app — free, local-first tool tracker for indie developers.

            **Windows:** Download the `.exe` installer and run it.
            **Mac:** Download the `.dmg`, open it, and drag StackMap to your Applications folder. If you see a security warning, right-click the app and choose Open.

            No account required. Your data stays on your device.
